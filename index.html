<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Nata'ani Bitselley-Romo — Educator &amp; Technologist</title>
    <meta name="description" content="Portfolio of Nata'ani Bitselley-Romo (Mr. B) — software developer and educator building bridges between the classroom and the codebase." />
    <meta name="author" content="Nata'ani Bitselley-Romo" />

    <!-- Open Graph -->
    <meta property="og:title" content="Nata'ani Bitselley-Romo — Educator &amp; Technologist" />
    <meta property="og:description" content="Software developer, educator, and builder. Check out my projects and get in touch." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://surge-tech.github.io/" />
    <meta property="og:image" content="https://surge-tech.github.io/og-preview.png" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nata'ani Bitselley-Romo — Educator &amp; Technologist" />
    <meta name="twitter:description" content="Software developer, educator, and builder. Check out my projects and get in touch." />
    <meta name="twitter:image" content="https://surge-tech.github.io/og-preview.png" />

    <!-- Favicon placeholder -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts — Space Grotesk with display=swap -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Inline script: apply stored theme before first paint to avoid flash -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored === 'light' || stored === 'dark' ? stored : (prefersDark ? 'dark' : 'light');
          document.documentElement.className = theme;
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
